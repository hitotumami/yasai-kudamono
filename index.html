<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>食材の断面展 | Inside the Harvest</title>
    <link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #fffaf0;
            --text-color: #2c3e50;
            --accent: #e67e22;
            --decoration: #27ae60;
            --card-bg: rgba(255, 255, 255, 0.8);
        }

        body {
            font-family: 'Shippori Mincho', serif;
            margin: 0; background-color: var(--bg-color); color: var(--text-color);
            line-height: 1.8;
            overflow-x: hidden;
            /* 和紙のような質感の背景 */
            background-image: 
                radial-gradient(var(--decoration) 0.5px, transparent 0.5px),
                url("https://www.transparenttextures.com/patterns/natural-paper.png");
            background-size: 40px 40px, auto;
        }

        /* 縦書きのサイドタイトル（スマホでも端に配置） */
        .side-title {
            position: fixed; right: 10px; top: 20%;
            writing-mode: vertical-rl;
            font-family: 'Yuji Syuku', serif;
            letter-spacing: 0.5em;
            opacity: 0.2;
            font-size: 1.2rem;
            z-index: -1;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }

        /* ヒーローセクション */
        .intro-section {
            padding: 80px 20px 40px;
            text-align: center;
        }

        .intro-section h1 {
            font-family: 'Yuji Syuku', serif;
            font-size: clamp(3rem, 15vw, 5rem);
            margin: 0;
            position: relative;
            display: inline-block;
        }

        .intro-section h1::after {
            content: ''; position: absolute; bottom: -10px; left: 50%;
            width: 40px; height: 2px; background: var(--decoration);
            transform: translateX(-50%);
        }

        h2.row-title {
            font-size: 0.9rem; color: var(--decoration);
            text-transform: uppercase; letter-spacing: 0.2em;
            margin: 60px 0 20px;
            display: flex; align-items: center;
        }
        h2.row-title::after { content: ''; flex: 1; height: 1px; background: rgba(39, 174, 96, 0.2); margin-left: 15px; }

        /* 横スクロールエリア */
        .card-row {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 20px;
            padding: 10px 0 30px;
            -webkit-overflow-scrolling: touch;
        }
        .card-row::-webkit-scrollbar { display: none; }

        /* カードデザイン（グラスモーフィズム風） */
        .card {
            flex: 0 0 280px;
            scroll-snap-align: center;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 2px; /* あえて少し角を立たせてギャラリー感を出す */
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }
        @media (max-width: 600px) { .card { flex: 0 0 85%; } }

        .card:active { transform: scale(0.98); }

        .card img, .empty-img { 
            width: 100%; height: 350px; object-fit: cover; 
            transition: filter 0.3s ease;
        }
        .empty-img { background: #e0e0e0; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; color: #888; }

        .card-title {
            padding: 20px;
            background: white;
            font-size: 0.9rem;
            font-weight: bold;
            text-align: left;
            position: relative;
        }
        .card-title::before {
            content: '●'; color: var(--decoration); margin-right: 8px; font-size: 0.6rem;
        }

        /* クイズエリア */
        .quiz-section {
            margin: 80px 0;
            padding: 40px 20px;
            background: white;
            border-radius: 20px;
            text-align: center;
        }

        /* モーダル：ここが修正のキモ */
        .modal {
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%;
            background: rgba(255, 250, 240, 0.95); /* 背景色に合わせた透過 */
            z-index: 2000;
            /* 中央寄せの設定 */
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 450px;
            max-height: 85vh;
            border-radius: 0; /* 直線的なデザイン */
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            overflow-y: auto;
            position: relative;
            animation: slideUp 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-img { width: 100%; height: 300px; object-fit: cover; }
        .modal-desc { padding: 35px 25px; }
        .modal-desc h2 { font-size: 1.4rem; margin-top: 0; color: var(--text-color); }
        
        .close-btn {
            position: absolute;
            top: 15px; right: 15px;
            width: 40px; height: 40px;
            background: white;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; cursor: pointer; z-index: 2100;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        footer {
            padding: 60px 0;
            text-align: center;
            font-size: 0.7rem;
            letter-spacing: 0.3em;
            opacity: 0.5;
        }

    </style>
</head>
<body>

<div class="side-title">野菜の断面を巡る旅</div>

<div class="intro-section">
    <h1>断</h1>
    <p style="margin-top:20px; font-size:0.8rem; letter-spacing:0.3em;">INSIDE THE HARVEST</p>
</div>

<div class="container">
    
    <h2 class="row-title">01 Observation</h2>
    <div class="card-row">
        <div class="card" onclick="openModal('S__115392542.jpg', 'キャベツの結球構造', '葉が重なり合い球状になる「結球」の様子です。')">
            <img src="S__115392542.jpg">
            <div class="card-title">結球の層</div>
        </div>
        <div class="card" onclick="openModal('S__115392550.jpg', 'オクラの分画と胎座', '5つの子房室と中央の胎座が観察できます。')">
            <img src="S__115392550.jpg">
            <div class="card-title">五角形の機能美</div>
        </div>
        <div class="card" onclick="openModal('S__115392530.jpg', '断面の多様性', '様々な野菜の内部構造を比較できます。')">
            <img src="S__115392530.jpg">
            <div class="card-title">多様な断面</div>
        </div>
    </div>

    <h2 class="row-title">02 History</h2>
    <div class="card-row">
        <div class="card" onclick="openModal('', '世界を繋いだ断面', '大航海時代を経て新大陸から運ばれた野菜の伝播史。')">
            <div class="empty-img">NO IMAGE</div>
            <div class="card-title">世界を繋いだ断面</div>
        </div>
        <div class="card" onclick="openModal('', 'デザインされた造形', '野生種から数千年かけて変化した、人類の欲望の記録。')">
            <div class="empty-img">NO IMAGE</div>
            <div class="card-title">デザインされた造形</div>
        </div>
        <div class="card" onclick="openModal('', '色彩の文化史', 'ニンジンのオレンジ色がたどった意外な政治的歴史。')">
            <div class="empty-img">NO IMAGE</div>
            <div class="card-title">色彩の文化史</div>
        </div>
    </div>

    <h2 class="row-title">03 Boundary</h2>
    <div class="card-row">
        <div class="card" onclick="openModal('', '野菜と果物の分岐点', '「木」か「草」か。人間が引いた分類の境界線。')">
            <div class="empty-img">NO IMAGE</div>
            <div class="card-title">野菜と果物の分岐点</div>
        </div>
        <div class="card" onclick="openModal('', '江戸の品種改良', '浮世絵にも描かれた、日本独自の野菜美学。')">
            <div class="empty-img">NO IMAGE</div>
            <div class="card-title">江戸の品種改良</div>
        </div>
    </div>

    <footer>
        MUSEUM PRACTICE III<br>
        NEKO TO SAKANA PROJECT 2026
    </footer>
</div>

<!-- モーダル構造 -->
<div id="infoModal" class="modal">
    <div class="modal-content">
        <div class="close-btn" onclick="closeModal()">&times;</div>
        <div id="modalVisual"></div>
        <div class="modal-desc">
            <h2 id="modalTitle"></h2>
            <p id="modalText"></p>
        </div>
    </div>
</div>

<script>
    function openModal(imgSrc, title, text) {
        const visualArea = document.getElementById('modalVisual');
        if (!imgSrc) {
            visualArea.innerHTML = `<div style="background:#f0f0f0; height:300px; display:flex; justify-content:center; align-items:center; font-size:1.5rem;">📷</div>`;
        } else {
            visualArea.innerHTML = `<img src="${imgSrc}" class="modal-img">`;
        }
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalText').innerText = text;
        
        const modal = document.getElementById('infoModal');
        modal.style.display = 'flex'; // blockではなくflexにすることで中央寄せ
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('infoModal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    // モーダルの外側をクリックしても閉じる
    window.onclick = function(event) {
        const modal = document.getElementById('infoModal');
        if (event.target == modal) closeModal();
    }
</script>

</body>
</html>
