<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>食材の断面展 | Inside the Harvest</title>
    <style>
        :root {
            --bg-color: #fffaf0;
            --text-color: #2c3e50;
            --accent: #e67e22;
            --decoration: #27ae60;
            --definition-color: #3498db;
        }

        body {
            font-family: 'Helvetica Neue', 'Hiragino Sans', 'Meiryo', sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            background-image: radial-gradient(var(--decoration) 0.5px, transparent 0.5px);
            background-size: 30px 30px;
        }

        .intro-section {
            max-width: 90%;
            margin: 30px auto;
            padding: 25px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            text-align: center;
            border-top: 5px solid var(--decoration);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto 60px;
            padding: 0 15px;
        }

        h2.row-title {
            font-size: 1.2rem;
            color: var(--decoration);
            border-bottom: 2px solid var(--decoration);
            display: inline-block;
            margin: 40px 0 20px;
        }

        /* カードの並び（グリッド）設定 */
        .card-row {
            display: grid;
            gap: 20px;
            margin-bottom: 20px;
        }

        /* 一段目：2列 */
        .row-1 { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
        
        /* 二段目・三段目：3列 */
        .row-2, .row-3 { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }

        @media (min-width: 900px) {
            .row-1 { grid-template-columns: repeat(2, 1fr); }
            .row-2, .row-3 { grid-template-columns: repeat(3, 1fr); }
        }

        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }

        .card:active { transform: scale(0.98); }

        .card.definition { border: 2px solid var(--definition-color); }
        .card.empty { border: 2px dashed #ccc; background: #f9f9f9; cursor: default; }

        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card .text-thumb {
            width: 100%; height: 200px;
            background: var(--definition-color);
            display: flex; justify-content: center; align-items: center;
            color: white; font-size: 3rem;
        }

        /* 三段目用の空の画像プレースホルダー */
        .empty-thumb {
            width: 100%; height: 200px;
            background: #eee;
            display: flex; justify-content: center; align-items: center;
            color: #999; font-style: italic;
        }

        .card-title { padding: 15px; text-align: center; font-weight: bold; }

        /* モーダル */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center;
            align-items: center; padding: 10px; overflow-y: auto;
        }

        .modal-content {
            background: white; width: 100%; max-width: 600px; margin: auto;
            border-radius: 15px; overflow: hidden; position: relative;
        }

        .modal-img { width: 100%; height: auto; max-height: 300px; object-fit: cover; }
        .modal-desc { padding: 25px; }
        .close-btn { position: fixed; top: 10px; right: 20px; font-size: 35px; color: white; cursor: pointer; }

    </style>
</head>
<body>

<div class="intro-section">
    <h1>食材の断面展</h1>
    <p>「食べる」の前に「観る」を楽しむ。食材の内部に隠された、生命の設計図を紐解く展示会です。</p>
</div>

<div class="container">
    
    <!-- 一段目 -->
    <h2 class="row-title">Step 01: 定義を知る</h2>
    <div class="card-row row-1">
        <div class="card definition" onclick="openModal('', '野菜とは？', '農学上の定義では、田畑で栽培される草本植物のうち、副食として食べられるものを指します。一般に、根、茎、葉などを食べるものから、未熟な果実を食べる「果菜類」まで含まれます。')">
            <div class="text-thumb">🥗</div>
            <div class="card-title">定義：野菜とは</div>
        </div>
        <div class="card definition" onclick="openModal('', '果物とは？', '園芸学では「果実的実用樹」と呼ばれ、2年以上栽培される樹木の実を指すのが一般的です。しかし、イチゴやスイカのように草本植物であっても、デザートとして扱われるものは「果実的野菜」と呼ばれます。')">
            <div class="text-thumb">🍎</div>
            <div class="card-title">定義：果物とは</div>
        </div>
    </div>

    <!-- 二段目 -->
    <h2 class="row-title">Step 02: 断面を観察する</h2>
    <div class="card-row row-2">
        <div class="card" onclick="openModal('S__115392542.jpg', 'キャベツの断面', '短縮した茎に葉が極めて高い密度でつくことで、重なり合い球状になる「結球」という現象を特徴とする。切断面からは、中心の芯から広がる葉の層状構造が観察できる。')">
            <img src="S__115392542.jpg" alt="キャベツ">
            <div class="card-title">キャベツ：結球の層</div>
        </div>
        <div class="card" onclick="openModal('S__115392550.jpg', 'オクラの断面', '縦断面では胎座に並ぶ種子が、横断面では五つの「室」が確認できる。これらの空隙には、ペクチン等の多糖類を主成分とする粘液が充満している。種子の保護や乾燥防止を担う。')">
            <img src="S__115392550.jpg" alt="オクラ">
            <div class="card-title">オクラ：五室の星型</div>
        </div>
        <div class="card" onclick="openModal('S__115392530.jpg', '断面の多様性', '中心のキャベツは葉の積層構造を、周囲のトマトやカボチャ、オクラからは、種子を保持する胎座や内部空洞の形態的特徴が観察できる。')">
            <img src="S__115392530.jpg" alt="全体">
            <div class="card-title">多様な断面の比較</div>
        </div>
    </div>

    <!-- 三段目（編集用） -->
    <h2 class="row-title">Step 03: さらなる発見</h2>
    <div class="card-row row-3">
        <!-- ここに文字や画像を入れてください -->
        <div class="card empty">
            <div class="empty-thumb">No Image</div>
            <div class="card-title">新規データ 01</div>
        </div>
        <div class="card empty">
            <div class="empty-thumb">No Image</div>
            <div class="card-title">新規データ 02</div>
        </div>
        <div class="card empty">
            <div class="empty-thumb">No Image</div>
            <div class="card-title">新規データ 03</div>
        </div>
    </div>

</div>

<!-- モーダル -->
<div id="infoModal" class="modal">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <div class="modal-content">
        <div id="modalVisual"></div>
        <div class="modal-desc">
            <h2 id="modalTitle" style="color:var(--decoration); margin-top:0;"></h2>
            <p id="modalText"></p>
        </div>
    </div>
</div>

<script>
    function openModal(imgSrc, title, text) {
        const visualArea = document.getElementById('modalVisual');
        if (imgSrc === '') {
            visualArea.innerHTML = `<div style="background:#3498db; color:white; height:150px; display:flex; justify-content:center; align-items:center; font-size:4rem;">ℹ️</div>`;
        } else {
            visualArea.innerHTML = `<img src="${imgSrc}" class="modal-img">`;
        }
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalText').innerText = text;
        document.getElementById('infoModal').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('infoModal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    window.onclick = function(event) {
        if (event.target == document.getElementById('infoModal')) closeModal();
    }
</script>

</body>
</html>
