<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>食材の断面展 | Inside the Harvest</title>
    <link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #fffaf0;
            --text-color: #2c3e50;
            --accent: #e67e22;
            --decoration: #27ae60;
            --quiz-accent: #9b59b6;
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Shippori Mincho', serif;
            margin: 0; background-color: var(--bg-color); color: var(--text-color);
            line-height: 1.8; overflow-x: hidden;
            background-image: radial-gradient(var(--decoration) 0.5px, transparent 0.5px), url("https://www.transparenttextures.com/patterns/natural-paper.png");
            background-size: 40px 40px, auto;
            -webkit-overflow-scrolling: touch;
        }

        /* --- 凝ったオープニング演出のスタイル --- */
        #door-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; display: flex; pointer-events: auto;
            background-color: var(--bg-color);
            transition: background-color 1s ease;
        }

        .door {
            width: 50%; height: 100%; position: relative;
            overflow: hidden;
            transition: transform 1.4s cubic-bezier(0.7, 0, 0.2, 1);
        }

        .door-img {
            position: absolute; top: 50%; width: 100%; height: 60%;
            background-repeat: no-repeat;
            background-size: contain;
            transition: transform 1.6s cubic-bezier(0.7, 0, 0.2, 1);
        }

        .door-left { border-right: 0.5px solid rgba(0,0,0,0.05); }
        .door-left .door-img {
            right: 0; transform: translateY(-50%);
            background-image: url('intro1.png'); /* 左側の断面画像 */
            background-position: right center;
        }

        .door-right { }
        .door-right .door-img {
            left: 0; transform: translateY(-50%);
            background-image: url('intro2.png'); /* 右側の断面画像 */
            background-position: left center;
        }

        /* アニメーション発火時 */
        #door-overlay.loaded { background-color: transparent; pointer-events: none; }
        #door-overlay.loaded .door-left { transform: translateX(-100%); }
        #door-overlay.loaded .door-right { transform: translateX(100%); }
        /* 視差効果：画像自体も少し外側に逃がす */
        #door-overlay.loaded .door-left .door-img { transform: translateY(-50%) translateX(-30%); }
        #door-overlay.loaded .door-right .door-img { transform: translateY(-50%) translateX(30%); }

        #door-message {
            position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%);
            font-family: 'Yuji Syuku', serif; letter-spacing: 0.5em;
            color: var(--text-color); opacity: 0.5; font-size: 0.9rem;
            text-align: center; width: 100%;
        }

        /* タップ時の微かな揺れ演出 */
        .cut-vibration { animation: vibrate 0.1s linear 2; }
        @keyframes vibrate { 0% { transform: translate(0); } 25% { transform: translate(2px, 2px); } 50% { transform: translate(-2px, -2px); } 75% { transform: translate(2px, -2px); } 100% { transform: translate(0); } }

        /* --- サイトコンテンツ --- */
        .side-title {
            position: fixed; right: 10px; top: 20%; writing-mode: vertical-rl;
            font-family: 'Yuji Syuku', serif; letter-spacing: 0.5em;
            opacity: 0.15; font-size: 1.1rem; z-index: -1; pointer-events: none;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 0 15px; }

        .intro-section { padding: 60px 15px 30px; text-align: center; }
        .intro-section h1 {
            font-family: 'Yuji Syuku', serif; font-size: clamp(3rem, 20vw, 6rem); margin: 0;
            position: relative; display: inline-block;
        }

        h2.row-title {
            font-size: 0.8rem; color: var(--decoration); text-transform: uppercase; letter-spacing: 0.2em;
            margin: 50px 0 15px; display: flex; align-items: center;
        }
        h2.row-title::after { content: ''; flex: 1; height: 1px; background: rgba(39, 174, 96, 0.2); margin-left: 10px; }

        .card-row {
            display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
            gap: 12px; padding: 10px 15px 30px; margin: 0 -15px;
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .card-row::-webkit-scrollbar { display: none; }

        .card {
            flex: 0 0 75%; scroll-snap-align: center; background: var(--card-bg);
            border-radius: 8px; overflow: hidden; box-shadow: 0 8px 25px rgba(0,0,0,0.07);
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.6s ease;
            opacity: 0; transform: translateY(20px);
        }
        .card.is-visible { opacity: 1; transform: translateY(0); }

        .img-container {
            width: 100%; height: 400px; background: #eee;
            position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        .card img { width: 100%; height: 100%; object-fit: contain; position: relative; z-index: 2; }
        .img-bg-blur {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            filter: blur(15px) brightness(0.9); opacity: 0.4; z-index: 1;
        }

        .card-title {
            padding: 15px; background: white; font-size: 0.85rem;
            font-weight: bold; text-align: center; border-top: 1px solid #f0f0f0;
        }

        .quiz-section {
            margin: 60px 0; padding: 40px 10px;
            background: rgba(255,255,255,0.7); border-radius: 12px; border: 1px dashed var(--quiz-accent);
        }
        .quiz-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .quiz-card {
            background: white; padding: 10px 5px; text-align: center;
            border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            opacity: 0; transform: scale(0.9); transition: 0.5s;
        }
        .quiz-card.is-visible { opacity: 1; transform: scale(1); }

        .quiz-icon {
            width: 100%; aspect-ratio: 1 / 1; background: #f8f9fa; border-radius: 50%; margin-bottom: 10px;
            overflow: hidden; border: 2px solid #eee;
        }
        .quiz-icon img { width: 100%; height: 100%; object-fit: cover; filter: blur(8px); }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(44, 62, 80, 0.95); z-index: 2000;
            justify-content: center; align-items: center; backdrop-filter: blur(10px);
            opacity: 0; transition: opacity 0.3s;
        }
        .modal.is-open { display: flex; opacity: 1; }
        .modal-content {
            background: white; width: 92%; max-width: 400px; max-height: 90vh;
            border-radius: 12px; position: relative; overflow-y: auto;
            transform: scale(0.9); transition: 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .modal.is-open .modal-content { transform: scale(1); }

        .modal-img { width: 100%; height: auto; max-height: 50vh; object-fit: contain; background: #000; }
        .modal-desc { padding: 25px 20px; }
        .modal-desc h2 { font-size: 1.1rem; margin: 0 0 10px; color: var(--decoration); }
        .modal-desc p { font-size: 0.9rem; margin: 0; }
        .close-btn { position: absolute; top: 10px; right: 10px; width: 30px; height: 30px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        footer { padding: 40px 0; text-align: center; font-size: 0.6rem; opacity: 0.4; }
    </style>
</head>
<body>

<!-- 凝ったオープニングドア演出 -->
<div id="door-overlay" onclick="openDoor()">
    <div class="door door-left">
        <div class="door-img"></div>
    </div>
    <div class="door door-right">
        <div class="door-img"></div>
    </div>
    <div id="door-message">タップして断面を見る</div>
</div>

<div class="side-title">野菜の断面を巡る旅</div>

<div class="intro-section">
    <h1>断</h1>
    <p style="margin-top:10px; font-size:0.75rem; letter-spacing:0.4em; color: var(--accent);">INSIDE THE HARVEST</p>
</div>

<div class="container">
    <h2 class="row-title">00 Definition</h2>
    <div class="card-row">
        <!-- サイト内のcase1.pngはそのまま野菜の定義として使用 -->
        <div class="card" onclick="openModal('case1.png', '野菜とは', '食用に供される草本性の植物の総称です。主に根、茎、葉、そして未熟な果実などを指します。')">
            <div class="img-container">
                <div class="img-bg-blur" style="background-image:url('case1.png')"></div>
                <img src="case1.png">
            </div>
            <div class="card-title">野菜の定義</div>
        </div>
        <div class="card" onclick="openModal('case2.png', '果物とは', '多年生の木本植物（樹木）に実る、食用可能な果実を指します。スイカなどは果実的野菜と呼ばれます。')">
            <div class="img-container">
                <div class="img-bg-blur" style="background-image:url('case2.png')"></div>
                <img src="case2.png">
            </div>
            <div class="card-title">果物の定義</div>
        </div>
    </div>

    <!-- 他のセクションは前回と同様に継続（省略せず一貫性保持） -->
    <h2 class="row-title">01 Observation</h2>
    <div class="card-row">
        <div class="card" onclick="openModal('case3.png', 'キャベツの結球構造', '葉が重なり合い球状になる「結球」の様子。内側ほど白く柔らかいのが特徴。')">
            <div class="img-container"><div class="img-bg-blur" style="background-image:url('case3.png')"></div><img src="case3.png"></div>
            <div class="card-title">結球の層</div>
        </div>
        <div class="card" onclick="openModal('case4.png', 'オクラの分画と胎座', '5つの子房室と中央の胎座。幾何学的な構造が独特の食感を生みます。')">
            <div class="img-container"><div class="img-bg-blur" style="background-image:url('case4.png')"></div><img src="case4.png"></div>
            <div class="card-title">五角形の機能美</div>
        </div>
        <div class="card" onclick="openModal('case5.png', '断面の多様性', '様々な植物の生存戦略が、断面のデザインに現れています。')">
            <div class="img-container"><div class="img-bg-blur" style="background-image:url('case5.png')"></div><img src="case5.png"></div>
            <div class="card-title">多様な断面</div>
        </div>
    </div>

    <h2 class="row-title">02 History</h2>
    <div class="card-row">
        <div class="card" onclick="openModal('case6.png', '世界を繋いだ断面', 'コロンブス交換以降のトマトやジャガイモ。断面には交易の歴史が。')">
            <div class="img-container"><div class="img-bg-blur" style="background-image:url('case6.png')"></div><img src="case6.png"></div>
            <div class="card-title">交易の歴史</div>
        </div>
        <div class="card" onclick="openModal('case7.png', 'デザインされた造形', '現在の密な断面は、数千年に及ぶ選別の結果です。')">
            <div class="img-container"><div class="img-bg-blur" style="background-image:url('case7.png')"></div><img src="case7.png"></div>
            <div class="card-title">改良の歩み</div>
        </div>
        <div class="card" onclick="openModal('case8.png', '色彩の文化史', 'ニンジンのオレンジ色など、断面の色にも文化が反映されています。')">
            <div class="img-container"><div class="img-bg-blur" style="background-image:url('case8.png')"></div><img src="case8.png"></div>
            <div class="card-title">色彩の文化</div>
        </div>
    </div>

    <h2 class="row-title">03 Boundary</h2>
    <div class="card-row">
        <div class="card" onclick="openModal('case9.png', '定義の境界線', 'スイカやイチゴは「果実的野菜」。木か草か。')">
            <div class="img-container"><div class="img-bg-blur" style="background-image:url('case9.png')"></div><img src="case9.png"></div>
            <div class="card-title">定義の境界</div>
        </div>
        <div class="card" onclick="openModal('case10.png', '日本独自の美学', '断面の美を愛でる感性も江戸時代に磨かれました。')">
            <div class="img-container"><div class="img-bg-blur" style="background-image:url('case10.png')"></div><img src="case10.png"></div>
            <div class="card-title">日本の美学</div>
        </div>
        <div class="card" onclick="openModal('case11.png', '共生の記録', '人間との共生で何を失い、何を得たか。')">
            <div class="img-container"><div class="img-bg-blur" style="background-image:url('case11.png')"></div><img src="case11.png"></div>
            <div class="card-title">共生の記録</div>
        </div>
    </div>

    <h2 class="row-title">04 Science</h2>
    <div class="card-row">
        <div class="card" onclick="openModal('case12.png', '生命のインフラ', '水を運ぶ道と栄養を運ぶ道。植物が生きるための設備。')">
            <div class="img-container"><div class="img-bg-blur" style="background-image:url('case12.png')"></div><img src="case12.png"></div>
            <div class="card-title">生命のインフラ</div>
        </div>
        <div class="card" onclick="openModal('case13.png', '幾何学的な秩序', 'ロマネスコのようなフラクタル構造。自然の数学的美。')">
            <div class="img-container"><div class="img-bg-blur" style="background-image:url('case13.png')"></div><img src="case13.png"></div>
            <div class="card-title">幾何学的秩序</div>
        </div>
        <div class="card" onclick="openModal('case14.png', '一瞬の静止画', '断面の変化は植物が身を守るための化学反応。')">
            <div class="img-container"><div class="img-bg-blur" style="background-image:url('case14.png')"></div><img src="case14.png"></div>
            <div class="card-title">変色の科学</div>
        </div>
    </div>

    <div class="quiz-section">
        <h3 style="text-align:center; font-family:'Yuji Syuku'; color:var(--quiz-accent); margin-bottom:20px;">断面推測クイズ</h3>
        <div class="quiz-grid">
            <div class="quiz-card" onclick="openModal('case15.png', '正解：オクラ', '特徴的な五角形。星のようなこの形。')">
                <div class="quiz-icon"><img src="case15.png"></div>
                <div style="font-size:0.6rem; font-weight:bold;">Q1. 星型</div>
            </div>
            <div class="quiz-card" onclick="openModal('case16.png', '正解：キャベツ', '複雑に重なり合う曲線。小宇宙です。')">
                <div class="quiz-icon"><img src="case16.png"></div>
                <div style="font-size:0.6rem; font-weight:bold;">Q2. 曲線</div>
            </div>
            <div class="quiz-card" onclick="openModal('case17.png', '正解：集合体', '様々な断面の物語を比較してみてください。')">
                <div class="quiz-icon"><img src="case17.png"></div>
                <div style="font-size:0.6rem; font-weight:bold;">Q3. 集合</div>
            </div>
        </div>
    </div>

    <footer>MUSEUM PRACTICE III<br>NEKO TO SAKANA PROJECT 2026</footer>
</div>

<div id="infoModal" class="modal">
    <div class="modal-content">
        <div class="close-btn" onclick="closeModal()">&times;</div>
        <div id="modalVisual"></div>
        <div class="modal-desc">
            <h2 id="modalTitle"></h2>
            <p id="modalText"></p>
        </div>
    </div>
</div>

<script>
    // オープニングドアの制御
    function openDoor() {
        const overlay = document.getElementById('door-overlay');
        if (overlay.classList.contains('loaded')) return;

        // 振動演出を追加
        document.body.classList.add('cut-vibration');
        
        // 演出開始
        overlay.classList.add('loaded');
        
        // アニメーション完了後に要素を削除
        setTimeout(() => {
            overlay.style.display = 'none';
            document.body.classList.remove('cut-vibration');
        }, 1600);
    }

    // スクロール監視
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('is-visible');
            }
        });
    }, { threshold: 0.1 });

    document.querySelectorAll('.card, .quiz-card').forEach(el => observer.observe(el));

    // モーダル制御
    function openModal(imgSrc, title, text) {
        const visualArea = document.getElementById('modalVisual');
        visualArea.innerHTML = `<img src="${imgSrc}" class="modal-img">`;
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalText').innerText = text;
        const modal = document.getElementById('infoModal');
        modal.classList.add('is-open');
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        const modal = document.getElementById('infoModal');
        modal.classList.remove('is-open');
        setTimeout(() => { document.body.style.overflow = ''; }, 300);
    }

    window.onclick = (e) => { if (e.target.id === 'infoModal') closeModal(); }
</script>

</body>
</html>
